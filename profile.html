<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook Profile</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="fb-body">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">facebook</div>
      <input type="text" class="search-box" placeholder="Search Facebook" />
    </div>

    <div class="topbar-center">
      <a href="home.html" class="nav-link">Home</a>
      <a href="profile.html" class="nav-link active">Profile</a>
      <a href="friends.html" class="nav-link">Friends</a>
      <a href="messages.html" class="nav-link">Messages</a>
    </div>

    <div class="topbar-right">
      <span id="navUserName">User</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="main-layout">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar left-sidebar">
      <div class="sidebar-card profile-mini">
        <div class="avatar large-avatar" id="sidebarAvatar">U</div>
        <h3 id="sidebarName">User Name</h3>
        <p id="sidebarEmail">user@email.com</p>
      </div>

      <div class="sidebar-menu">
        <a href="home.html">🏠 Home</a>
        <a href="profile.html">👤 My Profile</a>
        <a href="friends.html">👥 Friends</a>
        <a href="messages.html">💬 Messages</a>
      </div>
    </aside>

    <!-- CENTER -->
    <section class="feed">
      <div class="profile-cover-card">
        <div class="profile-cover"></div>

        <div class="profile-main-info">
          <div class="avatar profile-avatar" id="profileAvatar">U</div>

          <div class="profile-name-box">
            <h2 id="profileName">User Name</h2>
            <p id="profileEmail">user@email.com</p>
            <span class="profile-bio" id="profileBioText">No bio yet.</span>
          </div>
        </div>
      </div>

      <div class="profile-edit-card">
        <h3>Edit Profile</h3>
        <form id="profileForm" class="profile-form">
          <input type="text" id="editName" placeholder="Full Name" />
          <input type="text" id="editEmail" placeholder="Email" />
          <textarea id="editBio" rows="4" placeholder="Write your bio..."></textarea>
          <button type="submit" class="btn-primary">Save Profile</button>
        </form>
      </div>

      <div class="profile-posts-card">
        <h3>Your Posts</h3>
        <div id="myPostsList"></div>
      </div>
    </section>

    <!-- RIGHT SIDEBAR -->
    <aside class="sidebar right-sidebar">
      <div class="sidebar-card">
        <h3>About</h3>
        <p><strong>Status:</strong> Active User</p>
        <p><strong>Project:</strong> Facebook System Demo</p>
      </div>
    </aside>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
