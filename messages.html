<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook Messages</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="fb-body">

  <!-- Top Navbar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">facebook</div>
      <input type="text" placeholder="Search Facebook" class="search-box" />
    </div>

    <div class="topbar-center">
      <a href="home.html" class="nav-link">Home</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <a href="friends.html" class="nav-link">Friends</a>
      <a href="messages.html" class="nav-link active">Messages</a>
      <a href="notifications.html" class="nav-link">Notifications</a>
      <a href="settings.html" class="nav-link">Settings</a>
    </div>

    <div class="topbar-right">
      <span id="navUserName">User</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="main-layout messages-layout">
    <!-- Chat List -->
    <aside class="chat-sidebar">
      <div class="sidebar-card">
        <h2>Chats</h2>
        <div class="chat-user-list" id="chatUserList">
          <!-- JS inserts chat users -->
        </div>
      </div>
    </aside>

    <!-- Chat Window -->
    <section class="chat-main">
      <div class="chat-window-card">
        <div class="chat-header">
          <div class="chat-user-info">
            <div class="avatar" id="activeChatAvatar">A</div>
            <div>
              <h3 id="activeChatName">Alex</h3>
              <span class="chat-status">Active now</span>
            </div>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <!-- JS inserts messages -->
        </div>

        <div class="chat-input-box">
          <input type="text" id="messageInput" placeholder="Type a message..." />
          <button class="btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
